name: Build Lite Plugin ZIP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: seo-control-bridge-for-divi-lite
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate plugin header version
        run: |
          VERSION=$(grep -E '^ \* Version:' seo-control-bridge-for-divi-lite.php | awk '{print $3}')
          STABLE=$(grep -E '^Stable tag:' readme.txt | awk '{print $3}')
          test -n "$VERSION"
          test "$VERSION" = "$STABLE"
          echo "Version $VERSION validated"

      - name: Build ZIP
        run: |
          rm -rf dist
          mkdir -p "dist/${PLUGIN_SLUG}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='*.zip' \
            ./ "dist/${PLUGIN_SLUG}/"
          cd dist
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          cp "${PLUGIN_SLUG}.zip" "../${PLUGIN_SLUG}.zip"

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="/tmp/scbd-lite-release-notes.md"
          cat > "$NOTES_FILE" <<EOF
          ## SEO Control Bridge for Divi Lite ${VERSION}

          Public Lite release build for WordPress update delivery from GitHub.

          Highlights:
          - Native WordPress updater support through GitHub Releases.
          - Fresh GitHub release lookup during WordPress update checks.
          - Manual Check Again action for update detection.
          - Reduced release metadata display cache.

          Installable plugin package:
          - seo-control-bridge-for-divi-lite.zip
          EOF
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "SEO Control Bridge for Divi Lite ${VERSION}" --notes-file "$NOTES_FILE"
          gh release upload "$GITHUB_REF_NAME" "seo-control-bridge-for-divi-lite.zip" --clobber
