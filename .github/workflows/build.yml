name: Build Lite Plugin ZIP

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: seo-control-bridge-for-divi-lite
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate plugin header version
        run: |
          VERSION=$(grep -E '^ \* Version:' seo-control-bridge-for-divi-lite.php | awk '{print $3}')
          STABLE=$(grep -E '^Stable tag:' readme.txt | awk '{print $3}')
          test -n "$VERSION"
          test "$VERSION" = "$STABLE"
          echo "Version $VERSION validated"

      - name: Build ZIP
        run: |
          cd ..
          rm -rf build
          mkdir -p build/${PLUGIN_SLUG}
          rsync -a --exclude='.git' --exclude='.github' --exclude='*.zip' ${GITHUB_REPOSITORY##*/}/ build/${PLUGIN_SLUG}/
          cd build
          zip -r ${PLUGIN_SLUG}.zip ${PLUGIN_SLUG}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-control-bridge-for-divi-lite
          path: ../build/seo-control-bridge-for-divi-lite.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="/tmp/scbd-lite-release-notes.md"
          cat > "$NOTES_FILE" <<EOF
          ## SEO Control Bridge for Divi Lite ${VERSION}

          Public Lite release build for WordPress update delivery from GitHub.

          Highlights:
          - Getting Started link in Installed Plugins.
          - View Details modal support in Installed Plugins.
          - First-run Getting Started page after activation.
          - Native WordPress updater support through GitHub Releases.

          Installable plugin package:
          - seo-control-bridge-for-divi-lite.zip
          EOF
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "SEO Control Bridge for Divi Lite ${VERSION}" --notes-file "$NOTES_FILE"
          gh release upload "$GITHUB_REF_NAME" ../build/seo-control-bridge-for-divi-lite.zip --clobber
